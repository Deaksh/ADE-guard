services:
  - type: web
    name: adeguard-api
    runtime: python
    plan: free
    disk:
      name: hf-cache
      mountPath: /var/data
      sizeGB: 5
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COVID_ONLY
        value: "1"
      - key: SHAP_USE_TOKENIZER
        value: "0"
      - key: NER_MODEL_PATH
        value: "Deaksh/ADE-Guard-NER"
      - key: SEVERITY_MODEL
        value: "Deaksh/ADE-Guard"
      - key: HF_HOME
        value: "/var/data/hf"
      - key: HUGGINGFACE_HUB_CACHE
        value: "/var/data/hf/hub"
      - key: TRANSFORMERS_CACHE
        value: "/var/data/hf/transformers"
